<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nerofy Labs</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>

/* =============================
   DESIGN SYSTEM (APPLE-STYLE)
============================= */

:root{
--black:#050507;
--white:#ffffff;
--soft:#e6e9f2;
--muted:#cfd3dc;
--border:rgba(255,255,255,0.08);
--accent:#6ab4cc;

/* spacing scale */
--space-xs:8px;
--space-sm:16px;
--space-md:24px;
--space-lg:40px;
--space-xl:64px;
--space-xxl:120px;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
background:var(--black);
color:var(--white);
font-family:'Inter',sans-serif;
font-size:20px;
line-height:1.6;
}

/* =============================
   NAV
============================= */
nav{
position:fixed;
top:0;
left:0;
right:0;
height:80px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 var(--space-lg);
background:rgba(5,5,7,0.7);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
}

.nav-logo img{width:52px;}
.nav-logo-text{font-size:20px;letter-spacing:0.12em;}

.nav-links{display:flex;gap:32px;}
.nav-links a{color:var(--muted);font-size:16px;text-decoration:none;transition:0.3s;}
.nav-links a:hover{color:white;}

.nav-cta{
padding:12px 26px;
border:1px solid var(--border);
</html>
